<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="'Manrope','Segoe UI',system-ui,sans-serif">
  <defs>
    <filter id="sh3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0b1437" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1000" height="720" fill="#f4f6fb"/>

  <rect x="30" y="24" width="940" height="672" rx="18" fill="#ffffff" stroke="#e6e9f2" filter="url(#sh3)"/>
  <path d="M 30,76 V 42 a18,18 0 0 1 18,-18 H 952 a18,18 0 0 1 18,18 V 76 Z" fill="#0a1130"/>
  <circle cx="60" cy="50" r="6" fill="#ff6a1a"/>
  <circle cx="84" cy="50" r="6" fill="#c6f24e"/>
  <circle cx="108" cy="50" r="6" fill="#3a4570"/>
  <rect x="380" y="37" width="240" height="26" rx="13" fill="#182a63"/>
  <text x="500" y="54" text-anchor="middle" fill="#aab3d9" font-size="13" font-weight="600">nutriforge.app</text>

  <text x="64" y="130" font-family="'Fraunces',Georgia,serif" font-size="34" font-weight="600" fill="#0b1437">Pick your goal</text>
  <text x="64" y="158" font-size="15" fill="#5a6480">Each option explains exactly what it does to your targets.</text>

  <!-- option: lose weight -->
  <rect x="64" y="184" width="872" height="120" rx="14" fill="#ffffff" stroke="#e6e9f2"/>
  <circle cx="102" cy="230" r="12" fill="none" stroke="#c3cadf" stroke-width="2"/>
  <text x="136" y="228" font-size="20" font-weight="700" fill="#0b1437">Lose weight</text>
  <text x="136" y="258" font-size="15" fill="#5a6480">A moderate calorie deficit for steady, healthy fat loss</text>
  <text x="136" y="282" font-size="15" fill="#5a6480">(about 0.5 kg per week).</text>

  <!-- option: gain muscle (selected) -->
  <rect x="64" y="320" width="872" height="120" rx="14" fill="#fff6f0" stroke="#ff6a1a" stroke-width="2.5"/>
  <circle cx="102" cy="366" r="12" fill="#ff6a1a"/>
  <circle cx="102" cy="366" r="5" fill="#ffffff"/>
  <text x="136" y="364" font-size="20" font-weight="700" fill="#0b1437">Gain muscle</text>
  <rect x="330" y="348" width="86" height="24" rx="12" fill="#ff6a1a"/>
  <text x="373" y="365" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">SELECTED</text>
  <text x="136" y="394" font-size="15" fill="#5a6480">A calorie surplus with high protein to support</text>
  <text x="136" y="418" font-size="15" fill="#5a6480">lean muscle growth.</text>

  <!-- option: maintain -->
  <rect x="64" y="456" width="872" height="120" rx="14" fill="#ffffff" stroke="#e6e9f2"/>
  <circle cx="102" cy="502" r="12" fill="none" stroke="#c3cadf" stroke-width="2"/>
  <text x="136" y="500" font-size="20" font-weight="700" fill="#0b1437">Maintain</text>
  <text x="136" y="530" font-size="15" fill="#5a6480">Eat at maintenance to hold your current weight</text>
  <text x="136" y="554" font-size="15" fill="#5a6480">and body composition.</text>

  <!-- CTA -->
  <rect x="64" y="606" width="220" height="52" rx="26" fill="#ff6a1a"/>
  <text x="174" y="639" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Generate my plan</text>
</svg>
