<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="'Manrope','Segoe UI',system-ui,sans-serif">
  <defs>
    <filter id="sh2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0b1437" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1000" height="720" fill="#f4f6fb"/>

  <rect x="30" y="24" width="940" height="672" rx="18" fill="#ffffff" stroke="#e6e9f2" filter="url(#sh2)"/>
  <path d="M 30,76 V 42 a18,18 0 0 1 18,-18 H 952 a18,18 0 0 1 18,18 V 76 Z" fill="#0a1130"/>
  <circle cx="60" cy="50" r="6" fill="#ff6a1a"/>
  <circle cx="84" cy="50" r="6" fill="#c6f24e"/>
  <circle cx="108" cy="50" r="6" fill="#3a4570"/>
  <rect x="360" y="37" width="280" height="26" rx="13" fill="#182a63"/>
  <text x="500" y="54" text-anchor="middle" fill="#aab3d9" font-size="13" font-weight="600">nutriforge.app/plan#shopping</text>

  <text x="64" y="130" font-family="'Fraunces',Georgia,serif" font-size="34" font-weight="600" fill="#0b1437">🛒 Shopping list</text>
  <text x="64" y="158" font-size="15" fill="#5a6480">Every ingredient from your plan, combined into one list.</text>

  <rect x="64" y="184" width="872" height="472" rx="16" fill="#ffffff" stroke="#e6e9f2"/>

  <!-- items: two columns of 5 -->
  <!-- col 1 -->
  <g font-size="17" fill="#0b1437">
    <rect x="96" y="222" width="20" height="20" rx="5" fill="none" stroke="#ff6a1a" stroke-width="2"/>
    <text x="132" y="238">200 g Frango grelhado</text>
    <rect x="96" y="302" width="20" height="20" rx="5" fill="none" stroke="#ff6a1a" stroke-width="2"/>
    <text x="132" y="318">200 g Arroz</text>
    <rect x="96" y="382" width="20" height="20" rx="5" fill="none" stroke="#ff6a1a" stroke-width="2"/>
    <text x="132" y="398">250 g Feijão</text>
    <rect x="96" y="462" width="20" height="20" rx="5" fill="none" stroke="#ff6a1a" stroke-width="2"/>
    <text x="132" y="478">300 g Mandioca</text>
    <rect x="96" y="542" width="20" height="20" rx="5" fill="none" stroke="#ff6a1a" stroke-width="2"/>
    <text x="132" y="558">4 Ovos</text>
  </g>
  <!-- col 2 -->
  <g font-size="17" fill="#0b1437">
    <rect x="524" y="222" width="20" height="20" rx="5" fill="none" stroke="#ff6a1a" stroke-width="2"/>
    <text x="560" y="238">150 g Tilápia</text>
    <rect x="524" y="302" width="20" height="20" rx="5" fill="none" stroke="#ff6a1a" stroke-width="2"/>
    <text x="560" y="318">250 g Batata-doce</text>
    <rect x="524" y="382" width="20" height="20" rx="5" fill="none" stroke="#ff6a1a" stroke-width="2"/>
    <text x="560" y="398">200 g Iogurte natural</text>
    <rect x="524" y="462" width="20" height="20" rx="5" fill="none" stroke="#ff6a1a" stroke-width="2"/>
    <text x="560" y="478">1 Banana</text>
    <rect x="524" y="542" width="20" height="20" rx="5" fill="none" stroke="#ff6a1a" stroke-width="2"/>
    <text x="560" y="558">1 col. Azeite</text>
  </g>

  <!-- dividers -->
  <line x1="96" y1="262" x2="472" y2="262" stroke="#f0f2f8"/>
  <line x1="96" y1="342" x2="472" y2="342" stroke="#f0f2f8"/>
  <line x1="96" y1="422" x2="472" y2="422" stroke="#f0f2f8"/>
  <line x1="96" y1="502" x2="472" y2="502" stroke="#f0f2f8"/>
  <line x1="524" y1="262" x2="900" y2="262" stroke="#f0f2f8"/>
  <line x1="524" y1="342" x2="900" y2="342" stroke="#f0f2f8"/>
  <line x1="524" y1="422" x2="900" y2="422" stroke="#f0f2f8"/>
  <line x1="524" y1="502" x2="900" y2="502" stroke="#f0f2f8"/>

  <rect x="64" y="676" width="200" height="0" fill="none"/>
</svg>
